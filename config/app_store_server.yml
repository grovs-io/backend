# Apple App Store Server API credentials are now stored per-instance
# in the ios_server_api_keys table, uploaded via the dashboard.
# This file is kept only for the config_for loader but values are unused.
default: &default
  private_key: ""
  key_id: ""
  issuer_id: ""
  bundle_id: ""
  environment: sandbox

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
